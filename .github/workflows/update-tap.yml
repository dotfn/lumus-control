name: Update Homebrew Tap

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  update-tap:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get release tag
        id: get_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          if [ -z "${TAG}" ]; then
            echo "ERROR: No latest release found" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release: ${TAG} (version ${VERSION})"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: dotfn/homebrew-lumus
          token: ${{ secrets.TAP_PAT }}
          path: homebrew-lumus

      - name: Compute SHA256 for Apple Silicon
        id: shas
        env:
          TAG: ${{ steps.get_tag.outputs.tag }}
          VERSION: ${{ steps.get_tag.outputs.version }}
        run: |
          set -Eeuo pipefail

          ARM_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/lumus-control_${VERSION}_aarch64.dmg"
          echo "Downloading ARM64 DMG from: ${ARM_URL}"

          # Retry hasta 6 veces (30s entre intentos = 3 min total)
          ARM_SHA=""
          for i in $(seq 1 6); do
            echo "Attempt ${i}/6..."
            ARM_SHA=$(curl --fail --silent --location --max-time 60 "${ARM_URL}" 2>/dev/null | shasum -a 256 | cut -d' ' -f1)
            if [ -n "${ARM_SHA}" ]; then
              echo "SHA256 obtained on attempt ${i}"
              break
            fi
            echo "Asset not ready yet, waiting 30s..."
            sleep 30
          done

          if [ -z "${ARM_SHA}" ]; then
            echo "ERROR: ARM64 SHA256 is empty — DMG download failed after 6 attempts" >&2
            exit 1
          fi

          echo "arm_sha256=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "ARM64 SHA256: ${ARM_SHA}"

      - name: Update cask
        env:
          VERSION: ${{ steps.get_tag.outputs.version }}
          ARM_SHA: ${{ steps.shas.outputs.arm_sha256 }}
        run: |
          set -Eeuo pipefail
          cd homebrew-lumus

          cat > Casks/lumus-control.rb << EOF
cask "lumus-control" do
  version "${VERSION}"
  sha256 "${ARM_SHA}"

  url "https://github.com/dotfn/lumus-control/releases/download/v#{version}/lumus-control_#{version}_aarch64.dmg",
      verified: "github.com/dotfn/lumus-control/"
  name "Lumus Control"
  desc "Panel local para controlar lámparas WiZ via UDP"
  homepage "https://lumus-control.vercel.app"

  depends_on arch: :arm64

  livecheck do
    url :url
    strategy :github_latest
  end

  app "lumus-control.app"

  postflight do
    system_command "/usr/bin/xattr",
                   args: ["-dr", "com.apple.quarantine", "#{appdir}/lumus-control.app"]
  end
end
EOF

          echo "Cask generado:"
          cat Casks/lumus-control.rb

      - name: Commit and push
        env:
          VERSION: ${{ steps.get_tag.outputs.version }}
        run: |
          set -Eeuo pipefail
          cd homebrew-lumus
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/lumus-control.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update lumus-control to v${VERSION}"
          git push
