name: Build & Release

# Dispara el workflow al pushear a main.
# También se puede activar manualmente desde la pestaña Actions de GitHub.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Asegura que solo corra un workflow a la vez por rama,
# cancelando las ejecuciones anteriores pendientes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    strategy:
      fail-fast: false   # Si falla una plataforma, las demás siguen corriendo.
      matrix:
        include:
          # ── macOS (Apple Silicon) ────────────────────────────────────────────
          # Build sin firma (unsigned). Los usuarios deben abrir la app con
          # clic derecho → Abrir, o ejecutar en terminal:
          #   sudo xattr -rd com.apple.quarantine /Applications/wiz-control.app
          - platform: macos-latest
            os: macos-latest
            rust-target: aarch64-apple-darwin

          # ── Windows (64-bit) ─────────────────────────────────────────────────
          - platform: windows-latest
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc

          # ── Linux (x86-64) ───────────────────────────────────────────────────
          - platform: ubuntu-22.04
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Dependencias del sistema (solo Linux) ─────────────────────────────
      # Tauri en Linux requiere WebKit2GTK y otras librerías para el WebView.
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            pkg-config

      # ── 3. Node.js + pnpm ────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. Rust ──────────────────────────────────────────────────────────────
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust / Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      # ── 5. Build con Tauri ───────────────────────────────────────────────────
      # Sin variables de firma configuradas, Tauri genera binarios sin firmar.
      # Esto es correcto para distribución personal / side projects.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.rust-target }}

      # ── 6. Upload de artefactos ──────────────────────────────────────────────
      - name: Upload installers (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: wiz-control-macos-arm64
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.app
          if-no-files-found: warn
          retention-days: 30

      - name: Upload installers (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: wiz-control-windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload installers (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: wiz-control-linux-x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 30
