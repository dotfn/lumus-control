name: Build (macOS smoke test)

on:
  # Smoke test de build en macOS Apple Silicon.
  # Los builds multiplataforma reales (macOS + Windows) corren en release.yml.
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: build-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: aarch64

      - name: Run Rust tests
        run: cargo test --release --manifest-path src-tauri/Cargo.toml

      - name: Set up signing key file
        run: |
          if [ -z "$RAW_KEY" ]; then
            echo "ERROR: TAURI_SIGNING_PRIVATE_KEY secret is empty or not set"
            exit 1
          fi
          node -e "require('fs').writeFileSync(process.env.KEY_PATH, process.env.RAW_KEY.replace(/\s+/g, ''))"
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          KEY_PATH: ${{ github.workspace }}/tauri.key

      - name: Build Tauri app
        run: pnpm tauri build --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ github.workspace }}/tauri.key

      - name: Clean up signing key file
        if: always()  # limpiar incluso si el build falla
        run: rm -f "${{ github.workspace }}/tauri.key"
        shell: bash

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: lumus-control-macos-aarch64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            install.sh