<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb454" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffb454" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#007aff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#007aff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#heroGlow)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Lamp glow blob -->
  <ellipse cx="780" cy="310" rx="200" ry="200" fill="url(#lampGlow)"/>

  <!-- App card mockup -->
  <rect x="560" y="115" width="440" height="400" rx="20" fill="rgba(28,28,30,0.85)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Card: window controls -->
  <circle cx="592" cy="148" r="6" fill="rgba(255,95,87,0.5)"/>
  <circle cx="612" cy="148" r="6" fill="rgba(255,189,46,0.5)"/>
  <circle cx="632" cy="148" r="6" fill="rgba(40,200,64,0.5)"/>

  <!-- Card: lamp circle -->
  <circle cx="780" cy="265" r="52" fill="rgba(255,255,255,0.92)" filter="url(#f1)"/>
  <circle cx="780" cy="265" r="52" fill="none" stroke="#ffb454" stroke-width="2" opacity="0.8"/>
  <!-- Star/sparkle in lamp -->
  <g transform="translate(780,265)" fill="#ffb454" opacity="0.9">
    <polygon points="0,-16 3,-6 12,-6 5,0 8,11 0,5 -8,11 -5,0 -12,-6 -3,-6" />
  </g>

  <!-- Card: lamp label -->
  <text x="780" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="rgba(245,242,234,0.9)">Lámpara del Living Room</text>
  <text x="780" y="354" text-anchor="middle" font-family="system-ui, -apple-system, monospace" font-size="9" fill="rgba(154,150,140,0.8)" letter-spacing="1">ENCENDIDA · BRILLO 80%</text>

  <!-- Card: brightness bar -->
  <rect x="620" y="378" width="320" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="620" y="378" width="256" height="4" rx="2" fill="#007aff"/>

  <!-- Card: preset chips -->
  <rect x="620" y="402" width="92" height="28" rx="8" fill="rgba(255,180,84,0.12)" stroke="rgba(255,180,84,0.3)" stroke-width="1"/>
  <text x="666" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffb454">Cálido</text>
  <rect x="722" y="402" width="92" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="768" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="rgba(154,150,140,0.8)">Estudio</text>
  <rect x="824" y="402" width="92" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="870" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="rgba(154,150,140,0.8)">Ocaso</text>

  <!-- Left: Logo mark -->
  <rect x="160" y="220" width="48" height="48" rx="14" fill="url(#logoGrad)"/>
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#5856d6"/>
    </linearGradient>
  </defs>
  <!-- Sparkle in logo -->
  <g transform="translate(184,244)" fill="white" opacity="0.95">
    <polygon points="0,-10 2,-4 8,-4 3,0 5,7 0,3 -5,7 -3,0 -8,-4 -2,-4" />
  </g>

  <!-- Left: App name -->
  <text x="160" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#f5f2ea" letter-spacing="-0.5">Lumus Control</text>

  <!-- Left: Tagline -->
  <text x="160" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="rgba(154,150,140,0.9)" font-weight="500">Control local de luces inteligentes</text>
  <text x="160" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="rgba(154,150,140,0.9)" font-weight="500">para macOS. Sin nube. Sin lag.</text>

  <!-- Left: Pills -->
  <rect x="160" y="388" width="110" height="26" rx="13" fill="rgba(0,122,255,0.15)" stroke="rgba(0,122,255,0.3)" stroke-width="1"/>
  <text x="215" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#007aff" letter-spacing="0.5">OPEN SOURCE</text>
  <rect x="280" y="388" width="118" height="26" rx="13" fill="rgba(52,199,89,0.12)" stroke="rgba(52,199,89,0.3)" stroke-width="1"/>
  <text x="339" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#34c759" letter-spacing="0.5">100% PRIVADO</text>

  <!-- Bottom: URL -->
  <text x="600" y="575" text-anchor="middle" font-family="system-ui, -apple-system, monospace" font-size="13" fill="rgba(154,150,140,0.5)" letter-spacing="1">lumus-control.vercel.app</text>
</svg>
